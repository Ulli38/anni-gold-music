<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>LIVE Dashboard</title>

<style>

body{
background:#200f1d;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.card{
text-align:center;
padding:50px;
border-radius:20px;
background:rgba(255,255,255,0.05);
width:800px;
}

.songtitel{
font-size:80px;
font-weight:bold;
margin-bottom:20px;
text-transform:uppercase;
text-shadow:0 0 20px rgba(255,255,255,0.5);
}

.kuenstler{
font-size:42px;
opacity:0.9;
margin-bottom:40px;
letter-spacing:2px;
}

.live{
font-size:36px;
font-weight:bold;
color:#ff4d97;
text-shadow:0 0 15px rgb(255, 77, 216);
}


</style>
</head>

<body>

<div class="card">
<hr style="border:1px solid rgba(255,255,255,0.1); margin-bottom:40px;">
<div class="songtitel">
Kein Song aktiv
</div>

<div class="kuenstler">
-
</div>

<div class="live">
🔴 JETZT IM LIVE
</div>
<hr style="border:1px solid rgba(255,255,255,0.1); margin-top:40px;">
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>

const supabaseUrl =
"https://ktnalbuhlfrmgkmivubj.supabase.co";

const supabaseKey =
"sb_publishable_TmTgUV4k6o6bR8ik21EiDg_7BvGKYb4";

const supabaseClient =
window.supabase.createClient(
  supabaseUrl,
  supabaseKey
);

const songtitel =
document.querySelector(".songtitel");

const kuenstler =
document.querySelector(".kuenstler");

async function laden() {

  const { data, error } =
  await supabaseClient
    .from("Songs")
    .select("*")
    .eq("status", "Heute im LIVE")
    .limit(1);

  if (error) {
    console.error(error);
    return;
  }

  if (data && data.length > 0) {

    songtitel.textContent =
      data[0].songtitel;

    kuenstler.textContent =
      data[0].kuenstlername;

  }

}

laden();

setInterval(laden, 5000);

</script>
</body>
</html>

<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Anmeldung | ANNI GOLD MUSIC</title>

  <link rel="stylesheet" href="style.css?v=4">
  <link rel="manifest" href="manifest.json">

  <meta name="theme-color" content="#d4af37">
</head>

<body>

  <img
    src="assets/assets/music-ornament.png"
    class="side-ornament left-ornament"
    alt=""
  >

  <img
    src="assets/assets/music-ornament.png"
    class="side-ornament right-ornament"
    alt=""
  >

  <main class="container">

    <form id="loginForm" class="card">

      <div class="logo-container">
        <img
          src="assets/assets/anni-logo.png"
          alt="ANNI GOLD MUSIC"
          class="anni-logo"
        >
      </div>

      <h1>
        <span class="gold-icon">🔒</span>
        Anmeldung
      </h1>

      <p>
        Melde dich mit deinem Künstlerkonto an.
      </p>

      <label for="loginEmail">
  E-Mail-Adresse
</label>

<input
  type="email"
  id="loginEmail"
  placeholder="deine@email.de"
  autocomplete="email"
  required
>

      <label for="loginPassword">
        Passwort
      </label>

      <div class="password-box">

        <input
          type="password"
          id="loginPassword"
          placeholder="Passwort eingeben"
          autocomplete="current-password"
          required
        >

        <span
          class="toggle-password"
          onclick="togglePassword('loginPassword', this)"
        >
          👁
        </span>

      </div>

      <button type="submit">
        Anmelden
      </button>

      <a href="reset.html">
       🔑 Passwort vergessen?
    </a>

      <p class="form-link">
        Noch kein Konto?
        <a href="register.html">
          Jetzt registrieren
        </a>
      </p>

      <div id="status" class="status"></div>

    </form>

  </main>

  <a
    href="admin.html"
    class="secret-admin-link"
    title="Admin"
  >
    𝄞
  </a>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="auth.js"></script>

  <script>
    function togglePassword(id, icon) {
      const input = document.getElementById(id);

      if (input.type === "password") {
        input.type = "text";
        icon.textContent = "🙈";
      } else {
        input.type = "password";
        icon.textContent = "👁";
      }
    }
  </script>

  <script src="pwa.js?v=4"></script>
</body>

</html>

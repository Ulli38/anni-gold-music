<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>LIVE Playlist</title>

  <link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#d4af37">
</head>
<body>
<img src="assets/assets/music-ornament.png" class="side-ornament left-ornament" alt="">
<img src="assets/assets/music-ornament.png" class="side-ornament right-ornament" alt="">  

 <img src="assets/assets/anni-logo.png" alt="ANNI GOLD MUSIC" class="anni-logo">
<div class="container">
  <h1>Heute im LIVE</h1>
 <p style="color:#d4af37;">
Diese Songs sind für den aktuellen TikTok LIVE Stream geplant.
</p>
  <div id="liveListe"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabaseUrl = "https://ktnalbuhlfrmgkmivubj.supabase.co";
const supabaseKey = "sb_publishable_TmTgUV4k6o6bR8ik21EiDg_7BvGKYb4";

const supabaseClient =
window.supabase.createClient(supabaseUrl, supabaseKey);

const liveListe = document.getElementById("liveListe");

async function liveSongsLaden() {
  const { data, error } = await supabaseClient
    .from("Songs")
    .select("*")
    .eq("status", "Heute im LIVE");

  if (error) {
    alert(JSON.stringify(error));
    return;
  }

  if (!data || data.length === 0) {
    liveListe.innerHTML = "<p>Aktuell keine Songs im LIVE.</p>";
    return;
  }

  liveListe.innerHTML = "";

  data.forEach(function(song) {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML =
  "<h2>" + song.songtitel + "</h2>" +
  "<p><strong>Künstler:</strong> " + song.kuenstlername + "</p>" +
  "<p><strong>Einreicher:</strong> " + song.einreichename + "</p>" +
  "<p><strong>Beschreibung:</strong> " + song.beschreibung + "</p>";

const audio = document.createElement("audio");
audio.controls = true;
audio.src = song.audio_url;
audio.style.width = "100%";
audio.style.marginTop = "15px";

audio.onended = async function() {
  console.log("Song zu Ende:", song.id);

  const { error } = await supabaseClient
    .from("Songs")
    .update({ status: "Bereits gespielt" })
    .eq("id", song.id);

  if (error) {
    console.error("Fehler beim Aktualisieren:", error);
    alert("Fehler beim Aktualisieren: " + error.message);
    return;
  }

  alert("Song wurde automatisch auf Bereits gespielt gesetzt.");
  liveSongsLaden();
};

    card.appendChild(audio);
    liveListe.appendChild(card);

  });

}

liveSongsLaden();
</script>

<script src="pwa.js"></script>

</body>
</html>

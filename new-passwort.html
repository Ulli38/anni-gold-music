<form id="newPasswordForm" class="card">

  <div class="logo-container">
    <img
      src="assets/assets/anni-logo.png"
      alt="ANNI GOLD MUSIC"
      class="anni-logo"
    >
  </div>

  <h1>
    <span class="gold-icon">🔑</span>
    Neues Passwort
  </h1>

  <p>
    Gib dein neues Passwort zweimal ein.
  </p>

  <label for="newPassword">
    Neues Passwort
  </label>

  <div class="password-box">

    <input
      type="password"
      id="newPassword"
      placeholder="Neues Passwort eingeben"
      autocomplete="new-password"
      minlength="6"
      required
    >

    <span
      class="toggle-password"
      onclick="togglePassword('newPassword', this)"
    >
      👁
    </span>

  </div>

  <label for="confirmPassword">
    Passwort wiederholen
  </label>

  <div class="password-box">

    <input
      type="password"
      id="confirmPassword"
      placeholder="Passwort erneut eingeben"
      autocomplete="new-password"
      minlength="6"
      required
    >

    <span
      class="toggle-password"
      onclick="togglePassword('confirmPassword', this)"
    >
      👁
    </span>

  </div>

  <button
    type="submit"
    id="savePasswordButton"
    disabled
  >
    Neues Passwort speichern
  </button>

  <div
    id="status"
    class="status"
    aria-live="polite"
  >
    Reset-Link wird geprüft ...
  </div>

  <p class="form-link">
    <a href="login.html">
      ← Zur Anmeldung
    </a>
  </p>

</form>
